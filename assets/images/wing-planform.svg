<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <defs>
    <style>
      text { font-family: Georgia, serif; }
      .title { font-size: 14px; font-weight: bold; fill: #1e3a5f; }
      .axis-label { font-size: 13px; font-style: italic; fill: #5c5c5c; }
      .legend-text { font-size: 11px; fill: #3a3a3a; font-family: Georgia, serif; }
      .dim-label { font-size: 11px; fill: #5c5c5c; font-style: italic; font-family: Georgia, serif; }
    </style>
    <marker id="arrow-start" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto-start-reverse">
      <path d="M0,4 L8,0 L8,8 Z" fill="#5c5c5c"/>
    </marker>
    <marker id="arrow-end" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#5c5c5c"/>
    </marker>
    <marker id="arrow-end-navy" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1e3a5f"/>
    </marker>
    <marker id="arrow-start-navy" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto-start-reverse">
      <path d="M0,4 L8,0 L8,8 Z" fill="#1e3a5f"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#faf9f6"/>

  <!-- Border -->
  <rect x="1" y="1" width="898" height="418" fill="none" stroke="#d6d2c8" stroke-width="1.5"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" class="title">Fig. 2 — Planform comparison: baseline (rectangular) vs. optimised (tapered)</text>

  <!-- Drawing area: left margin 80, right margin 80, top 60, bottom 80 -->
  <!-- Wing root at x=100, tip at x=780, root chord vertical range -->
  <!-- Root: y from 80 to 330 (250px chord at root) -->
  <!-- Tip baseline: same 250px chord at x=780, y 80 to 330 -->
  <!-- Tip optimised: 100px chord centered, slight sweep -->

  <!-- Define key coordinates -->
  <!-- Root leading edge: (100, 80), Root trailing edge: (100, 330) -->
  <!-- Baseline tip leading edge: (780, 80), Baseline tip trailing edge: (780, 330) -->
  <!-- Optimised tip leading edge: (780, 143), Optimised tip trailing edge: (780, 268) -->
  <!-- Sweep: leading edge goes from (100,80) to (780, 143) -->

  <!-- Spanwise station lines (thin, in axis color) -->
  <!-- Stations at eta = 0.2, 0.4, 0.6, 0.8 -->
  <!-- eta=0.2 -> x = 100 + 0.2*680 = 236 -->
  <!-- eta=0.4 -> x = 100 + 0.4*680 = 372 -->
  <!-- eta=0.6 -> x = 100 + 0.6*680 = 508 -->
  <!-- eta=0.8 -> x = 100 + 0.8*680 = 644 -->

  <!-- Optimised wing chord at each station (linear taper from 250 to 125) -->
  <!-- At station x, chord = 250 - (250-125)*(x-100)/680 -->
  <!-- Leading edge sweep: y_LE = 80 + 63*(x-100)/680 -->
  <!-- Trailing edge: y_TE = y_LE + chord -->

  <!-- Station at eta=0.2, x=236: chord=213, y_LE=80+18=98, y_TE=311 -->
  <!-- Station at eta=0.4, x=372: chord=175, y_LE=80+37=117, y_TE=292 -->
  <!-- Station at eta=0.6, x=508: chord=138, y_LE=80+56=136, y_TE=274 -->
  <!-- Station at eta=0.8, x=644: chord=100, y_LE=80+75=155, y_TE=255 -->

  <!-- Spanwise station lines clipped to optimised wing shape -->
  <line x1="236" y1="80" x2="236" y2="330" stroke="#d6d2c8" stroke-width="0.8"/>
  <line x1="372" y1="80" x2="372" y2="330" stroke="#d6d2c8" stroke-width="0.8"/>
  <line x1="508" y1="80" x2="508" y2="330" stroke="#d6d2c8" stroke-width="0.8"/>
  <line x1="644" y1="80" x2="644" y2="330" stroke="#d6d2c8" stroke-width="0.8"/>

  <!-- Station labels (eta values) -->
  <text x="236" y="345" text-anchor="middle" class="dim-label">η=0.2</text>
  <text x="372" y="345" text-anchor="middle" class="dim-label">η=0.4</text>
  <text x="508" y="345" text-anchor="middle" class="dim-label">η=0.6</text>
  <text x="644" y="345" text-anchor="middle" class="dim-label">η=0.8</text>

  <!-- Root and tip labels -->
  <text x="100" y="345" text-anchor="middle" class="dim-label">η=0</text>
  <text x="780" y="345" text-anchor="middle" class="dim-label">η=1</text>

  <!-- Baseline wing: rectangular planform, dashed outline -->
  <rect x="100" y="80" width="680" height="250"
        fill="rgba(191,186,176,0.08)"
        stroke="#bfbab0" stroke-width="1.8"
        stroke-dasharray="8,5"/>

  <!-- Optimised wing: tapered planform with sweep -->
  <!-- Leading edge: (100,80) -> (780,143) -->
  <!-- Trailing edge: (100,330) -> (780,268) -->
  <!-- Shape: quadrilateral -->
  <polygon points="100,80 780,143 780,268 100,330"
           fill="rgba(30,58,95,0.06)"
           stroke="#1e3a5f" stroke-width="2"/>

  <!-- Symmetry / root line indicator -->
  <line x1="100" y1="60" x2="100" y2="360" stroke="#d6d2c8" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="88" y="57" text-anchor="middle" class="dim-label" font-size="10px" fill="#5c5c5c">root</text>

  <!-- === Dimension annotations === -->

  <!-- Root chord dimension arrow (left side, vertical) -->
  <!-- Arrow from y=80 to y=330 at x=58 -->
  <line x1="58" y1="80" x2="58" y2="330" stroke="#5c5c5c" stroke-width="1"
        marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="58" y1="80" x2="100" y2="80" stroke="#5c5c5c" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="58" y1="330" x2="100" y2="330" stroke="#5c5c5c" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="44" y="208" text-anchor="middle" class="dim-label"
        transform="rotate(-90 44 208)">root chord c_r</text>

  <!-- Tip chord dimension arrow (right side, vertical) -->
  <!-- Optimised tip: y=143 to y=268, at x=820 -->
  <line x1="820" y1="143" x2="820" y2="268" stroke="#5c5c5c" stroke-width="1"
        marker-start="url(#arrow-start)" marker-end="url(#arrow-end)"/>
  <line x1="780" y1="143" x2="820" y2="143" stroke="#5c5c5c" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="780" y1="268" x2="820" y2="268" stroke="#5c5c5c" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="836" y="208" text-anchor="middle" class="dim-label"
        transform="rotate(90 836 208)">tip chord c_t</text>

  <!-- Span b dimension arrow (horizontal, below) -->
  <line x1="100" y1="368" x2="780" y2="368" stroke="#1e3a5f" stroke-width="1.2"
        marker-start="url(#arrow-start-navy)" marker-end="url(#arrow-end-navy)"/>
  <text x="440" y="383" text-anchor="middle" class="dim-label" fill="#1e3a5f">semi-span b/2</text>

  <!-- Sweep angle annotation -->
  <!-- Sweep arc near root leading edge -->
  <!-- Leading edge goes from (100,80) to (780,143): angle = atan(63/680) ~ 5.3 deg (visual only) -->
  <!-- Draw a small arc and label near (100,80) -->
  <line x1="100" y1="80" x2="200" y2="80" stroke="#8b2c2c" stroke-width="1" stroke-dasharray="5,3"/>
  <path d="M 160,80 A 60,60 0 0,1 158.3,85.5" fill="none" stroke="#8b2c2c" stroke-width="1.2"/>
  <text x="168" y="76" class="dim-label" fill="#8b2c2c" font-size="11px">Λ (sweep)</text>

  <!-- Legend box -->
  <rect x="100" y="385" width="340" height="28" fill="#faf9f6" stroke="#d6d2c8" stroke-width="1" rx="3"/>
  <!-- Baseline legend item -->
  <line x1="115" y1="399" x2="155" y2="399" stroke="#bfbab0" stroke-width="1.8" stroke-dasharray="8,5"/>
  <text x="162" y="403" class="legend-text">Baseline (rectangular)</text>
  <!-- Optimised legend item -->
  <line x1="270" y1="399" x2="310" y2="399" stroke="#1e3a5f" stroke-width="2"/>
  <text x="317" y="403" class="legend-text">Optimised (tapered)</text>

</svg>
