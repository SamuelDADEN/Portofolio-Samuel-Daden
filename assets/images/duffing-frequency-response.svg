<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <defs>
    <style>text { font-family: Georgia, serif; }</style>
    <marker id="arrowUp" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M4,1 L7,7 L4,5 L1,7 Z" fill="#1e3a5f"/>
    </marker>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M4,7 L7,1 L4,3 L1,1 Z" fill="#1e3a5f"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="#faf9f6"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1e3a5f">Fig. 2 — Nonlinear frequency response: hardening Duffing oscillator (jump phenomenon)</text>

  <!-- Plot border: left=75, top=55, right=840, bottom=355 -->
  <rect x="75" y="55" width="765" height="300" fill="none" stroke="#d6d2c8" stroke-width="1"/>

  <!-- Vertical grid lines at omega = 0.6, 0.8, 1.0, 1.2, 1.4 -->
  <line x1="202.5" y1="55" x2="202.5" y2="355" stroke="#d6d2c8" stroke-width="0.5" stroke-dasharray="3,4"/>
  <line x1="330" y1="55" x2="330" y2="355" stroke="#d6d2c8" stroke-width="0.5" stroke-dasharray="3,4"/>
  <line x1="457.5" y1="55" x2="457.5" y2="355" stroke="#d6d2c8" stroke-width="0.5" stroke-dasharray="3,4"/>
  <line x1="585" y1="55" x2="585" y2="355" stroke="#d6d2c8" stroke-width="0.5" stroke-dasharray="3,4"/>
  <line x1="712.5" y1="55" x2="712.5" y2="355" stroke="#d6d2c8" stroke-width="0.5" stroke-dasharray="3,4"/>

  <!-- Horizontal grid lines at A = 0.5, 1.0, 1.5 -->
  <line x1="75" y1="280" x2="840" y2="280" stroke="#d6d2c8" stroke-width="0.5" stroke-dasharray="3,4"/>
  <line x1="75" y1="205" x2="840" y2="205" stroke="#d6d2c8" stroke-width="0.5" stroke-dasharray="3,4"/>
  <line x1="75" y1="130" x2="840" y2="130" stroke="#d6d2c8" stroke-width="0.5" stroke-dasharray="3,4"/>

  <!-- Linear resonance reference at omega/omega0 = 1.0 -->
  <line x1="457.5" y1="55" x2="457.5" y2="355" stroke="#bfbab0" stroke-width="1.2" stroke-dasharray="6,4"/>

  <!-- Stable upper branch: (0.6,0.30) rising to peak (1.35,1.80) then sharp drop -->
  <path d="
    M 202.5,310
    C 233.8,302 265.1,292 297,278
    C 328.9,264 363,247 394.9,228
    C 425,210 445,199 457.5,192
    C 470,185 490,170 520.1,152
    C 548,136 568,120 601,104
    C 625,92 648,82 673,79
    C 686,77.5 692,78 700,82
    C 710,88 718,100 724,118
    C 730,138 735,165 740,200
    C 745,230 749,265 752,292
  " fill="none" stroke="#1e3a5f" stroke-width="2.2"/>

  <!-- Stable lower branch: (0.6,0.15) rising gently to (1.6,0.60) -->
  <path d="
    M 202.5,332.5
    C 233.8,330 265.1,326 297,322
    C 330,318 363,314 394.9,309
    C 426,304 445,300 457.5,297
    C 476,293 498,289 520.1,284
    C 548,279 568,275 600,271
    C 625,268 648,265 675,262
    C 700,259 720,257 750,254
    C 775,251 810,249 840,247
  " fill="none" stroke="#1e3a5f" stroke-width="2.2"/>

  <!-- Unstable branch: dashed red connecting lower fold (omega~1.07) to upper fold (omega~1.43) -->
  <path d="
    M 501.9,299.5
    C 530,285 560,265 590,243
    C 620,221 655,220 680,225
    C 705,230 720,233 731.6,238
  " fill="none" stroke="#8b2c2c" stroke-width="1.8" stroke-dasharray="7,4"/>

  <!-- Jump up arrow at lower fold (omega~1.07) -->
  <line x1="501.9" y1="299.5" x2="501.9" y2="162" stroke="#1e3a5f" stroke-width="1.4" marker-end="url(#arrowUp)"/>
  <text x="510" y="230" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#1e3a5f">Jump up</text>

  <!-- Jump down arrow at upper fold (omega~1.43) -->
  <line x1="731.6" y1="238" x2="731.6" y2="265" stroke="#1e3a5f" stroke-width="1.4" marker-end="url(#arrowDown)"/>
  <text x="736" y="254" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#1e3a5f">Jump down</text>

  <!-- Axes -->
  <line x1="75" y1="355" x2="840" y2="355" stroke="#d6d2c8" stroke-width="1.5"/>
  <line x1="75" y1="55" x2="75" y2="355" stroke="#d6d2c8" stroke-width="1.5"/>

  <!-- X axis ticks -->
  <line x1="75" y1="355" x2="75" y2="361" stroke="#d6d2c8" stroke-width="1.2"/>
  <text x="75" y="374" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5c5c5c">0.4</text>
  <line x1="202.5" y1="355" x2="202.5" y2="361" stroke="#d6d2c8" stroke-width="1.2"/>
  <text x="202.5" y="374" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5c5c5c">0.6</text>
  <line x1="330" y1="355" x2="330" y2="361" stroke="#d6d2c8" stroke-width="1.2"/>
  <text x="330" y="374" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5c5c5c">0.8</text>
  <line x1="457.5" y1="355" x2="457.5" y2="361" stroke="#d6d2c8" stroke-width="1.2"/>
  <text x="457.5" y="374" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5c5c5c">1.0</text>
  <line x1="585" y1="355" x2="585" y2="361" stroke="#d6d2c8" stroke-width="1.2"/>
  <text x="585" y="374" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5c5c5c">1.2</text>
  <line x1="712.5" y1="355" x2="712.5" y2="361" stroke="#d6d2c8" stroke-width="1.2"/>
  <text x="712.5" y="374" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5c5c5c">1.4</text>
  <line x1="840" y1="355" x2="840" y2="361" stroke="#d6d2c8" stroke-width="1.2"/>
  <text x="840" y="374" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5c5c5c">1.6</text>

  <!-- Y axis ticks -->
  <line x1="75" y1="355" x2="69" y2="355" stroke="#d6d2c8" stroke-width="1.2"/>
  <text x="62" y="359" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#5c5c5c">0.0</text>
  <line x1="75" y1="280" x2="69" y2="280" stroke="#d6d2c8" stroke-width="1.2"/>
  <text x="62" y="284" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#5c5c5c">0.5</text>
  <line x1="75" y1="205" x2="69" y2="205" stroke="#d6d2c8" stroke-width="1.2"/>
  <text x="62" y="209" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#5c5c5c">1.0</text>
  <line x1="75" y1="130" x2="69" y2="130" stroke="#d6d2c8" stroke-width="1.2"/>
  <text x="62" y="134" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#5c5c5c">1.5</text>
  <line x1="75" y1="55" x2="69" y2="55" stroke="#d6d2c8" stroke-width="1.2"/>
  <text x="62" y="59" text-anchor="end" font-family="Georgia, serif" font-size="11" fill="#5c5c5c">2.0</text>

  <!-- Axis labels -->
  <text x="457.5" y="400" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#5c5c5c">ω / ω₀</text>
  <text x="20" y="205" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#5c5c5c" transform="rotate(-90, 20, 205)">Amplitude A</text>

  <!-- Legend -->
  <rect x="82" y="62" width="248" height="78" fill="#faf9f6" stroke="#d6d2c8" stroke-width="0.8" rx="2"/>
  <line x1="92" y1="79" x2="122" y2="79" stroke="#1e3a5f" stroke-width="2.2"/>
  <text x="128" y="83" font-family="Georgia, serif" font-size="11" fill="#5c5c5c">Stable branch</text>
  <line x1="92" y1="100" x2="122" y2="100" stroke="#8b2c2c" stroke-width="1.8" stroke-dasharray="7,4"/>
  <text x="128" y="104" font-family="Georgia, serif" font-size="11" fill="#5c5c5c">Unstable branch</text>
  <line x1="92" y1="121" x2="122" y2="121" stroke="#bfbab0" stroke-width="1.2" stroke-dasharray="6,4"/>
  <text x="128" y="125" font-family="Georgia, serif" font-size="11" fill="#5c5c5c">Linear resonance (ω/ω₀ = 1)</text>
</svg>
