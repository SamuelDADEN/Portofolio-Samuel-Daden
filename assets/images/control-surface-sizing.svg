<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <rect width="900" height="400" fill="#faf9f6"/>

  <!-- Grid lines -->
  <g stroke="#d6d2c8" stroke-width="1">
    <line x1="80" y1="50" x2="80" y2="320"/>
    <line x1="80" y1="320" x2="820" y2="320"/>
    <line x1="80" y1="50" x2="820" y2="50"/>
    <line x1="820" y1="50" x2="820" y2="320"/>
    <!-- Horizontal grid -->
    <line x1="80" y1="117" x2="820" y2="117" stroke-dasharray="4,4"/>
    <line x1="80" y1="184" x2="820" y2="184" stroke-dasharray="4,4"/>
    <line x1="80" y1="251" x2="820" y2="251" stroke-dasharray="4,4"/>
    <!-- Vertical grid -->
    <line x1="207" y1="50" x2="207" y2="320" stroke-dasharray="4,4"/>
    <line x1="334" y1="50" x2="334" y2="320" stroke-dasharray="4,4"/>
    <line x1="461" y1="50" x2="461" y2="320" stroke-dasharray="4,4"/>
    <line x1="588" y1="50" x2="588" y2="320" stroke-dasharray="4,4"/>
    <line x1="715" y1="50" x2="715" y2="320" stroke-dasharray="4,4"/>
  </g>

  <!-- Feasible region -->
  <polygon points="200,280 350,200 550,160 720,140 820,135 820,320 80,320 80,320 200,280"
           fill="#1e3a5f" fill-opacity="0.07" stroke="none"/>

  <!-- Constraint curve 1 — roll rate -->
  <polyline points="80,310 150,290 250,250 380,200 520,165 650,148 750,140 820,138"
            fill="none" stroke="#1e3a5f" stroke-width="2.5"/>

  <!-- Constraint curve 2 — pitch authority -->
  <polyline points="80,280 200,240 350,195 480,170 610,158 740,152 820,150"
            fill="none" stroke="#8b2c2c" stroke-width="2.5" stroke-dasharray="8,4"/>

  <!-- Optimal point -->
  <circle cx="490" cy="168" r="7" fill="#1e3a5f" stroke="#faf9f6" stroke-width="2"/>
  <line x1="490" y1="168" x2="490" y2="320" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="168" x2="490" y2="168" stroke="#1e3a5f" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Axes labels -->
  <text x="450" y="355" font-family="Georgia, serif" font-size="13" fill="#5c5c5c" text-anchor="middle">Control surface chord ratio  c_f / c</text>
  <text x="30" y="185" font-family="Georgia, serif" font-size="13" fill="#5c5c5c" text-anchor="middle" transform="rotate(-90,30,185)">Span fraction</text>

  <!-- Legend -->
  <line x1="560" y1="80" x2="595" y2="80" stroke="#1e3a5f" stroke-width="2.5"/>
  <text x="602" y="84" font-family="Georgia, serif" font-size="11" fill="#1e3a5f">Roll-rate constraint</text>
  <line x1="560" y1="100" x2="595" y2="100" stroke="#8b2c2c" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="602" y="104" font-family="Georgia, serif" font-size="11" fill="#8b2c2c">Pitch authority constraint</text>
  <circle cx="568" cy="120" r="5" fill="#1e3a5f"/>
  <text x="580" y="124" font-family="Georgia, serif" font-size="11" fill="#1e3a5f">Optimal solution</text>

  <!-- Title -->
  <text x="450" y="25" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1e3a5f" text-anchor="middle">Fig. 1 — Feasible region and active constraints</text>
</svg>
