<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
  <rect width="900" height="400" fill="#faf9f6"/>

  <!-- Grid -->
  <g stroke="#d6d2c8" stroke-width="1">
    <line x1="80" y1="50" x2="80" y2="330"/>
    <line x1="80" y1="330" x2="700" y2="330"/>
    <line x1="80" y1="50" x2="700" y2="50" stroke-dasharray="4,4"/>
    <line x1="700" y1="50" x2="700" y2="330" stroke-dasharray="4,4"/>
    <line x1="80" y1="140" x2="700" y2="140" stroke-dasharray="4,4"/>
    <line x1="80" y1="190" x2="700" y2="190" stroke-dasharray="3,3"/>
    <line x1="80" y1="240" x2="700" y2="240" stroke-dasharray="4,4"/>
    <line x1="210" y1="50" x2="210" y2="330" stroke-dasharray="4,4"/>
    <line x1="340" y1="50" x2="340" y2="330" stroke-dasharray="4,4"/>
    <line x1="470" y1="50" x2="470" y2="330" stroke-dasharray="4,4"/>
    <line x1="600" y1="50" x2="600" y2="330" stroke-dasharray="4,4"/>
  </g>

  <!-- Baseline polar (higher drag) -->
  <path d="M 120,320 C 140,290 170,240 210,200 C 255,158 310,120 370,95 C 430,70 490,60 540,62 C 590,65 630,82 660,108 C 685,130 695,155 698,180"
        fill="none" stroke="#bfbab0" stroke-width="2.5" stroke-dasharray="10,5"/>

  <!-- Optimised polar (lower drag) -->
  <path d="M 110,325 C 128,295 155,248 195,208 C 240,165 295,128 355,102 C 415,76 475,64 530,65 C 580,67 625,82 658,108 C 682,130 693,156 697,182"
        fill="none" stroke="#1e3a5f" stroke-width="2.5"/>

  <!-- L/D max tangent line -->
  <line x1="80" y1="330" x2="530" y2="65" stroke="#8b2c2c" stroke-width="1.5" stroke-dasharray="6,4"/>
  <circle cx="410" cy="112" r="6" fill="#8b2c2c" stroke="#faf9f6" stroke-width="2"/>
  <circle cx="370" cy="118" r="6" fill="#1e3a5f" stroke="#faf9f6" stroke-width="2"/>

  <!-- Axes labels -->
  <text x="390" y="365" font-family="Georgia, serif" font-size="13" fill="#5c5c5c" text-anchor="middle">Drag coefficient  C_D</text>
  <text x="28" y="190" font-family="Georgia, serif" font-size="13" fill="#5c5c5c" text-anchor="middle" transform="rotate(-90,28,190)">Lift coefficient  C_L</text>

  <!-- Tick labels x -->
  <text x="80"  y="348" font-family="Georgia, serif" font-size="10" fill="#5c5c5c" text-anchor="middle">0</text>
  <text x="210" y="348" font-family="Georgia, serif" font-size="10" fill="#5c5c5c" text-anchor="middle">0.01</text>
  <text x="340" y="348" font-family="Georgia, serif" font-size="10" fill="#5c5c5c" text-anchor="middle">0.02</text>
  <text x="470" y="348" font-family="Georgia, serif" font-size="10" fill="#5c5c5c" text-anchor="middle">0.03</text>
  <text x="600" y="348" font-family="Georgia, serif" font-size="10" fill="#5c5c5c" text-anchor="middle">0.04</text>

  <!-- Legend -->
  <line x1="730" y1="140" x2="765" y2="140" stroke="#bfbab0" stroke-width="2.5" stroke-dasharray="10,5"/>
  <text x="772" y="144" font-family="Georgia, serif" font-size="11" fill="#5c5c5c">Baseline</text>
  <line x1="730" y1="165" x2="765" y2="165" stroke="#1e3a5f" stroke-width="2.5"/>
  <text x="772" y="169" font-family="Georgia, serif" font-size="11" fill="#1e3a5f">Optimised</text>
  <line x1="730" y1="190" x2="765" y2="190" stroke="#8b2c2c" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="772" y="194" font-family="Georgia, serif" font-size="11" fill="#8b2c2c">(L/D)_max</text>

  <!-- Title -->
  <text x="390" y="25" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1e3a5f" text-anchor="middle">Fig. 1 — Drag polar: baseline vs. optimised wing</text>
</svg>
